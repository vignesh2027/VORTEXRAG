<svg width="1000" height="420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="vortex" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="420" fill="url(#bg)"/>
  
  <!-- Grid lines -->
  <g opacity="0.08" stroke="#7c3aed" stroke-width="1">
    <line x1="0" y1="70" x2="1000" y2="70"/>
    <line x1="0" y1="140" x2="1000" y2="140"/>
    <line x1="0" y1="210" x2="1000" y2="210"/>
    <line x1="0" y1="280" x2="1000" y2="280"/>
    <line x1="0" y1="350" x2="1000" y2="350"/>
    <line x1="100" y1="0" x2="100" y2="420"/>
    <line x1="200" y1="0" x2="200" y2="420"/>
    <line x1="300" y1="0" x2="300" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="420"/>
    <line x1="500" y1="0" x2="500" y2="420"/>
    <line x1="600" y1="0" x2="600" y2="420"/>
    <line x1="700" y1="0" x2="700" y2="420"/>
    <line x1="800" y1="0" x2="800" y2="420"/>
    <line x1="900" y1="0" x2="900" y2="420"/>
  </g>
  
  <!-- Spiral vortex circles -->
  <g filter="url(#glow)" opacity="0.5">
    <circle cx="850" cy="210" r="160" fill="none" stroke="url(#vortex)" stroke-width="1.5" stroke-dasharray="8,4"/>
    <circle cx="850" cy="210" r="120" fill="none" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="6,3"/>
    <circle cx="850" cy="210" r="80" fill="none" stroke="#06b6d4" stroke-width="2" stroke-dasharray="4,2"/>
    <circle cx="850" cy="210" r="40" fill="none" stroke="#a855f7" stroke-width="2.5"/>
    <circle cx="850" cy="210" r="15" fill="#7c3aed" opacity="0.8"/>
  </g>
  
  <!-- Layer flow dots -->
  <g filter="url(#glow)">
    <circle cx="80" cy="210" r="8" fill="#a855f7"/>
    <circle cx="155" cy="210" r="8" fill="#8b5cf6"/>
    <circle cx="230" cy="210" r="8" fill="#7c3aed"/>
    <circle cx="305" cy="210" r="8" fill="#6d28d9"/>
    <circle cx="380" cy="210" r="8" fill="#06b6d4"/>
    <circle cx="455" cy="210" r="8" fill="#0891b2"/>
    <circle cx="530" cy="210" r="8" fill="#0e7490"/>
    <!-- Arrow lines between dots -->
    <line x1="92" y1="210" x2="143" y2="210" stroke="#7c3aed" stroke-width="2" opacity="0.6"/>
    <line x1="167" y1="210" x2="218" y2="210" stroke="#7c3aed" stroke-width="2" opacity="0.6"/>
    <line x1="242" y1="210" x2="293" y2="210" stroke="#7c3aed" stroke-width="2" opacity="0.6"/>
    <line x1="317" y1="210" x2="368" y2="210" stroke="#06b6d4" stroke-width="2" opacity="0.6"/>
    <line x1="392" y1="210" x2="443" y2="210" stroke="#06b6d4" stroke-width="2" opacity="0.6"/>
    <line x1="467" y1="210" x2="518" y2="210" stroke="#06b6d4" stroke-width="2" opacity="0.6"/>
  </g>
  
  <!-- Layer labels -->
  <g font-family="monospace" font-size="11" fill="#a5b4fc" text-anchor="middle">
    <text x="80" y="232">TVE</text>
    <text x="155" y="232">VRC</text>
    <text x="230" y="232">SDC</text>
    <text x="305" y="232">CPG</text>
    <text x="380" y="232">RFG</text>
    <text x="455" y="232">CCB</text>
    <text x="530" y="232">FV</text>
  </g>
  
  <!-- Main title -->
  <text x="60" y="90" font-family="system-ui, -apple-system, sans-serif" 
        font-size="52" font-weight="900" fill="url(#vortex)" filter="url(#glow)">VORTEXRAG</text>
  
  <!-- Subtitle -->
  <text x="60" y="130" font-family="system-ui, sans-serif" font-size="18" fill="#c4b5fd" opacity="0.9">
    7-Layer RAG · Semantic Drift Elimination · Context Poison Guard
  </text>
  
  <!-- Stats bar -->
  <rect x="60" y="280" width="660" height="80" rx="8" fill="#1e1b4b" opacity="0.8"/>
  
  <g font-family="system-ui, sans-serif" text-anchor="middle">
    <text x="160" y="308" font-size="13" fill="#a5b4fc">Exact Match</text>
    <text x="160" y="338" font-size="32" font-weight="700" fill="#a855f7" filter="url(#glow)">74.8</text>
    
    <line x1="265" y1="290" x2="265" y2="350" stroke="#3730a3" stroke-width="1"/>
    
    <text x="365" y="308" font-size="13" fill="#a5b4fc">Faithfulness</text>
    <text x="365" y="338" font-size="32" font-weight="700" fill="#06b6d4" filter="url(#glow)">0.94</text>
    
    <line x1="465" y1="290" x2="465" y2="350" stroke="#3730a3" stroke-width="1"/>
    
    <text x="565" y="308" font-size="13" fill="#a5b4fc">vs Naive RAG</text>
    <text x="565" y="338" font-size="32" font-weight="700" fill="#10b981" filter="url(#glow)">+13.6</text>
  </g>
  
  <!-- Bottom label -->
  <text x="60" y="395" font-family="system-ui, sans-serif" font-size="13" fill="#6366f1" opacity="0.8">
    github.com/vignesh2027/VORTEXRAG · doi.org/10.5281/zenodo.20579702 · MIT License
  </text>
</svg>